<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 · Jade Stock</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07100d;
  --green:   #34d399;
  --green-2: #6ee7b7;
  --green-d: #064e3b;
  --text:    #d1fae5;
  --muted:   #4d7a68;
  --crack:   #1a3a2a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  overflow: hidden;
}

/* Fundo com brilho radial */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(52,211,153,.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 20% 20%, rgba(110,231,183,.04) 0%, transparent 60%);
  pointer-events: none;
}

.scene {
  max-width: 420px;
  width: 100%;
  text-align: center;
  position: relative;
  animation: fadeUp .8s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Pedra de jade quebrada — SVG inline */
.jade-wrap {
  width: 160px;
  height: 160px;
  margin: 0 auto 32px;
  position: relative;
}

.jade-wrap svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 24px rgba(52,211,153,.25))
          drop-shadow(0 0 6px rgba(52,211,153,.15));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%       { transform: translateY(-8px) rotate(1deg); }
}

/* Partículas de fragmento */
.shard {
  position: absolute;
  border-radius: 2px;
  background: var(--green);
  opacity: 0;
  animation: shardFly var(--d, 3s) var(--delay, 0s) ease-in-out infinite;
}
@keyframes shardFly {
  0%   { opacity: 0;   transform: translate(0,0) rotate(0deg) scale(1); }
  20%  { opacity: .6; }
  100% { opacity: 0;   transform: translate(var(--tx,20px), var(--ty,-40px)) rotate(var(--r,45deg)) scale(.3); }
}

.shard:nth-child(1) { width:6px; height:10px; top:30%; left:10%; --tx:-30px; --ty:-50px; --r:60deg;  --d:3.2s; --delay:.3s; }
.shard:nth-child(2) { width:4px; height:7px;  top:50%; left:5%;  --tx:-20px; --ty:-30px; --r:-40deg; --d:2.8s; --delay:.9s; }
.shard:nth-child(3) { width:8px; height:5px;  top:20%; right:8%; --tx:25px;  --ty:-45px; --r:80deg;  --d:3.5s; --delay:.1s; }
.shard:nth-child(4) { width:5px; height:8px;  top:60%; right:5%; --tx:30px;  --ty:-20px; --r:-60deg; --d:2.6s; --delay:1.2s; }
.shard:nth-child(5) { width:4px; height:4px;  top:70%; left:20%; --tx:-15px; --ty:-60px; --r:120deg; --d:3.8s; --delay:.6s; }

.code-404 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(72px, 20vw, 96px);
  font-weight: 800;
  line-height: .9;
  letter-spacing: -4px;
  background: linear-gradient(135deg, #a8ffcb 0%, #34d399 40%, #0d7a52 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  position: relative;
}

/* Linha de rachadura no 404 */
.code-404::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity: .4;
}

.tagline {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.3;
}

.desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 36px;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
}

.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 48px;
  padding: 0 24px;
  border-radius: 9999px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: transform .15s, box-shadow .15s;
}
.btn:active { transform: scale(.96); }

.btn-primary {
  background: var(--green);
  color: #022c1c;
  box-shadow: 0 0 20px rgba(52,211,153,.2);
}
.btn-primary:hover { box-shadow: 0 0 32px rgba(52,211,153,.35); }

.btn-ghost {
  background: rgba(52,211,153,.06);
  color: var(--green);
  border: 1px solid rgba(52,211,153,.18);
}
.btn-ghost:hover { background: rgba(52,211,153,.12); }

/* Divisor */
.divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--muted), transparent);
  margin: 0 auto 20px;
  opacity: .3;
}

.footer-note {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .5px;
  opacity: .6;
}
</style>
</head>
<body>
<div class="scene">

  <!-- Pedra de jade quebrada -->
  <div class="jade-wrap">
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>

    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#a8ffcb"/>
          <stop offset="50%"  stop-color="#34d399"/>
          <stop offset="100%" stop-color="#065f46"/>
        </linearGradient>
        <linearGradient id="gB" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#6ee7b7"/>
          <stop offset="100%" stop-color="#047857"/>
        </linearGradient>
        <linearGradient id="gC" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#d1fae5" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#10b981" stop-opacity=".6"/>
        </linearGradient>
        <linearGradient id="gD" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#064e3b"/>
          <stop offset="100%" stop-color="#34d399" stop-opacity=".7"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Fragmento principal esquerdo (maior) -->
      <polygon points="100,30 60,18 20,80 45,110 88,118 100,90" fill="url(#gA)" opacity=".95" filter="url(#glow)"/>
      <!-- Fragmento principal direito -->
      <polygon points="100,30 140,18 178,75 158,115 112,118 100,90" fill="url(#gB)" opacity=".9" filter="url(#glow)"/>
      <!-- Fragmento inferior esquerdo -->
      <polygon points="88,118 45,110 55,158 100,175 100,135" fill="url(#gC)" opacity=".85"/>
      <!-- Fragmento inferior direito -->
      <polygon points="112,118 158,115 148,160 100,175 100,135" fill="url(#gD)" opacity=".85"/>
      <!-- Fragmento pequeno topo -->
      <polygon points="100,30 118,10 130,28 100,38" fill="#a8ffcb" opacity=".7"/>
      <!-- Fragmento soltando superior esquerdo -->
      <polygon points="60,18 35,8 28,30 55,35" fill="#6ee7b7" opacity=".6"
        transform="translate(-8,-6) rotate(-12 48 20)"/>
      <!-- Fragmento soltando direita -->
      <polygon points="155,70 175,55 185,78 162,88" fill="#34d399" opacity=".5"
        transform="translate(10,0) rotate(8 170 70)"/>

      <!-- Linha de rachadura central — efeito quebrado -->
      <polyline points="100,30 96,55 104,72 98,90 103,110 100,135 100,175"
        stroke="#d1fae5" stroke-width="1.2" stroke-dasharray="3,4" opacity=".5"/>
      <!-- Rachadura secundária -->
      <polyline points="100,90 80,100 70,115 55,118"
        stroke="#6ee7b7" stroke-width=".8" stroke-dasharray="2,5" opacity=".35"/>
      <polyline points="100,90 122,98 135,112 155,115"
        stroke="#6ee7b7" stroke-width=".8" stroke-dasharray="2,5" opacity=".35"/>

      <!-- Brilho interno -->
      <ellipse cx="85" cy="65" rx="14" ry="9" fill="white" opacity=".08" transform="rotate(-20 85 65)"/>
      <ellipse cx="118" cy="58" rx="10" ry="7" fill="white" opacity=".06" transform="rotate(15 118 58)"/>
    </svg>
  </div>

  <div class="tagline">Jade Stock</div>
  <div class="code-404">404</div>
  <h1>Pedra perdida</h1>
  <p class="desc">Esta página não existe ou foi movida. Volte para o início e continue controlando seu estoque.</p>

  <div class="actions">
    <a class="btn btn-primary" href="/">← Início</a>
    <a class="btn btn-ghost" href="/app.html">Abrir app</a>
  </div>

  <div class="divider"></div>
  <p class="footer-note">Jade Stock · Gestão de estoque para pequenos negócios</p>
</div>
</body>
</html>
